<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hearts"></div>
<div class="particles"></div>

<section id="welcome">

<div class="card">

<h2 class="smallTitle">
🎂 Happy Birthday
</h2>

<h1 id="name">
Sweetheart ❤️
</h1>

<p class="message">
Today isn't just another day...
It's the day the world became more beautiful because you were born.
✨
</p>

<img src="assets/teddy.png" class="teddy">

<div class="buttons">

<button id="yesBtn">
Yes ❤️
</button>

<button id="noBtn">
No 🙈
</button>

</div>

</div>

</section>

<section id="balloonScene"">

<h1 class="balloonTitle">
Pop Every Balloon ❤️
</h1>

<p class="balloonSub">
Every balloon hides a surprise...
</p>

<div class="balloonArea">

<div class="popBalloon" data-word="You"></div>

<div class="popBalloon" data-word="Are"></div>

<div class="popBalloon" data-word="My"></div>

<div class="popBalloon" data-word="Everything ❤️"></div>

</div>

<div id="wordContainer"></div>

<button id="continueBtn">
Continue ➜
</button>

</section>

<div id="heartContainer"></div>

<div id="sparkles"></div>

<div class="background-balloons">

<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

</div>
<section id="cakeScene">

<div class="nightSky"></div>

<div class="fireflies"></div>

<h1 class="wishTitle">

Close your eyes ✨

</h1>

<p class="wishSub">

Make a wish...
then blow the candle ❤️

</p>

<div class="cakeContainer">

<div class="cake">

<div class="candle">

<div class="flame" id="flame"></div>

</div>

<div class="cakeTop"></div>

<div class="cakeBottom"></div>

</div>

</div>

<button id="blowBtn">

🕯 Blow Candle

</button>

</section>
<script src="script.js"></script>

</body>
</html>
